<title>VIVID — Pakistan's Premier Fashion Store</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #FF2D78;
    --secondary: #7B2FFF;
    --bg: #050505;
    --card-bg: #0d0d0d;
    --text: #ffffff;
    --text-dim: rgba(255, 255, 255, 0.4);
    --border: rgba(255, 255, 255, 0.08);
    --safe-area: clamp(16px, 5vw, 48px);
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes tilt3d { 0%, 100% { transform: perspective(800px) rotateX(8deg) rotateY(-12deg); } 50% { transform: perspective(800px) rotateX(-6deg) rotateY(10deg); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulseBig { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } }
  @keyframes orbit { 0% { transform: rotate(0deg) translateX(120px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(120px) rotate(-360deg); } }
  
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  
  .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  .responsive-section { padding: 80px var(--safe-area); display: flex; align-items: center; position: relative; overflow: hidden; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; padding: 0 var(--safe-area) 80px; }
  
  @media (max-width: 1024px) {
    .responsive-section { padding: 60px var(--safe-area); }
    .product-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  }
  @media (max-width: 768px) {
    .responsive-section { padding: 40px var(--safe-area); flex-direction: column; text-align: center; }
    .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .hero-scene-container { position: relative !important; width: 100% !important; height: 300px !important; margin-top: 24px; transform: scale(0.85) !important; }
    .hero-content { text-align: center !important; }
    .hero-cta-group { justify-content: center !important; }
    .hero-stats { justify-content: center !important; gap: 24px !important; margin-top: 32px !important; }
    .hero-scene-3d-home { display: none !important; }
    .nav-categories { display: none !important; }
    .cat-hero-content { text-align: left !important; }
  }
  @media (max-width: 480px) {
    .product-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; padding: 0 12px 60px !important; }
    .hero-content h1 { font-size: 48px !important; line-height: 0.88 !important; }
    .hero-cta-group button { padding: 13px 22px !important; font-size: 11px !important; }
    .hero-stats { gap: 20px !important; }
    .logo-text { display: none; }
    .find-style-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
  }
  @media (max-width: 360px) {
    .product-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 6px !important; padding: 0 8px 50px !important; }
    .hero-content h1 { font-size: 38px !important; }
  }

  .neon-text { text-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary)33; }
  .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
  .gradient-text { background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .card-3d { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
  .card-3d:hover { transform: perspective(1000px) rotateX(6deg) rotateY(-6deg) translateY(-12px) !important; }
  .product-card-3d { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
  .product-card-3d:hover { transform: perspective(1000px) rotateX(4deg) rotateY(-4deg) translateY(-10px) !important; }

  .hero-card-1, .tilt3d1 { animation: tilt3d 5s ease-in-out infinite; }
  .hero-card-2, .tilt3d2 { animation: tilt3d 6s ease-in-out infinite; animation-delay: -2s; }
  .hero-card-3, .tilt3d3 { animation: tilt3d 7s ease-in-out infinite; animation-delay: -4s; }
  .hero-card-container:hover { animation-play-state: paused; transform: scale(1.05) perspective(1000px) rotateY(-10deg) !important; z-index: 100 !important; }

  @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(255,45,120,0.7); } 70% { box-shadow: 0 0 0 15px rgba(255,45,120,0); } 100% { box-shadow: 0 0 0 0 rgba(255,45,120,0); } }
  .btn-premium { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; }
  .btn-premium:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.15); box-shadow: 0 12px 24px rgba(255,45,120,0.4); }
  .btn-premium:active { transform: translateY(-1px) scale(0.98); }
  .btn-pulse { animation: pulseGlow 2s infinite; }
  .menu-btn { display: none; }
  @media (max-width: 768px) {
    .menu-btn { display: flex !important; }
  }

  /* ── Product Card Mobile ── */
  @media (max-width: 480px) {
    .product-info { padding: 8px 10px !important; }
    .product-name { font-size: 11px !important; margin-bottom: 2px !important; }
    .product-price { font-size: 13px !important; }
    .product-desc { display: none !important; }
    .product-colors { display: none !important; }
    .product-rating { font-size: 9px !important; margin-bottom: 6px !important; }
    .product-add-btn { width: 28px !important; height: 28px !important; font-size: 16px !important; border-radius: 8px !important; }
    .wishlist-btn { width: 26px !important; height: 26px !important; font-size: 11px !important; opacity: 1 !important; }
    .product-tag { font-size: 7px !important; padding: 3px 7px !important; }
  }
  .cat-hero-content { max-width: 55%; }
  .cat-hero-cards { display: block; }
  @media (max-width: 768px) {
    .cat-hero-content { max-width: 100% !important; text-align: center !important; }
    .cat-hero-cards { display: none !important; }
    .hero-scene-container { display: none !important; }
    .responsive-section { min-height: auto !important; padding: 60px 20px 40px !important; }
    .cat-hero-stats { justify-content: center !important; }
  }
  @media (max-width: 480px) {
    .cat-hero-content h1 { font-size: clamp(40px, 12vw, 72px) !important; }
    .cat-hero-content p { font-size: 13px !important; }
    .cat-hero-stats { gap: 16px !important; }
    .search-filter-row { flex-direction: column !important; }
  }
  /* ── Home Category Cards ── */
  .cat-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
  .cat-card:active { transform: scale(0.96); }
  @media (max-width: 768px) {
    .find-style-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; padding: 0 14px 50px !important; }
    .cat-card { height: clamp(140px, 44vw, 210px) !important; border-radius: 14px !important; }
    .cat-card-title { font-size: 15px !important; }
    .cat-card-count { font-size: 9px !important; }
    .cat-card-arrow { width: 24px !important; height: 24px !important; font-size: 10px !important; }
  }
  @media (max-width: 480px) {
    .find-style-grid { gap: 8px !important; padding: 0 10px 44px !important; }
    .cat-card { height: clamp(120px, 42vw, 160px) !important; border-radius: 10px !important; }
    .cat-card-title { font-size: 12px !important; letter-spacing: 0.5px !important; }
    .cat-card-count { font-size: 8px !important; }
  }
  .hide-scrollbar {
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
    -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
  }
  .hide-scrollbar::-webkit-scrollbar {
    display: none; /* Chrome, Safari and Opera */
  }

function waCheckoutMsg(cart){
  const items=cart.map(i=>`• ${i.name} (x${i.qty}) — Rs ${(i.price*i.qty).toLocaleString()}`).join('\n');
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const msg=`Hi VIVID! I want to place this order:\n\n${items}\n\n*Total: Rs ${total.toLocaleString()}*\n\nPlease confirm availability and payment details. Thank you!`;
  return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
}

/* ═══ BRANDED SVG LOGO ═══ */
function VividLogo({theme,onClick,size=28}){
  const p=theme?.primary||'#FF2D78';
  const s=theme?.secondary||'#7B2FFF';
  return(
    <div onClick={onClick} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
      {/* Icon mark — diamond V shape */}
      <svg width={size+4} height={size+4} viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={p}/>
            <stop offset="100%" stopColor={s}/>
          </linearGradient>
          <linearGradient id="lg2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor={s}/>
            <stop offset="100%" stopColor={p}/>
          </linearGradient>
        </defs>
        {/* Outer diamond */}
        <path d="M18 2 L34 18 L18 34 L2 18 Z" fill="url(#lg1)" opacity="0.15"/>
        <path d="M18 2 L34 18 L18 34 L2 18 Z" stroke="url(#lg1)" strokeWidth="1.5" fill="none"/>
        {/* V shape inside */}
        <path d="M9 11 L18 25 L27 11" stroke="url(#lg2)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
        {/* Center dot */}
        <circle cx="18" cy="25" r="2" fill={p}/>
      </svg>
      {/* Wordmark */}
    <span className="logo-text gradient-text" style={{
    fontFamily: "'Bebas Neue',sans-serif",
    fontSize: size,
    letterSpacing: 5,
    color: '#ffffff',
    fontWeight: 700,
    lineHeight: 1,
}}>VIVID</span>
    </div>
  );
}

/* ═══ PRODUCT CARD ═══ */
function ProductCard({product,theme,onAddCart,onWishlist,isWished}){
  const [hover,setHover]=useState(false);
  const [imgErr,setImgErr]=useState(false);
  const [tilt,setTilt]=useState({x:0,y:0});
  const cardRef=useRef(null);

  const handleMove=(e)=>{
    const rect=cardRef.current.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width-0.5;
    const y=(e.clientY-rect.top)/rect.height-0.5;
    setTilt({x:y*15,y:x*-15});
  };

  const handleLeave=()=>{
    setTilt({x:0,y:0});
    setHover(false);
  };
  const discount=product.old?Math.round((1-product.price/product.old)*100):null;
  const img=PRODUCT_IMAGES[product.id];
  return(
    <div ref={cardRef} onMouseMove={handleMove} onMouseLeave={handleLeave} onMouseEnter={()=>setHover(true)}
      style={{position:'relative',background:theme.bg2,borderRadius:24,overflow:'hidden',border:`1px solid ${theme.primary}18`,cursor:'pointer',transition:'transform 0.1s ease-out, box-shadow 0.3s ease',transform:`perspective(1000px) rotateX(${tilt.x}deg) rotateY(${tilt.y}deg) translateY(${hover?-10:0}px)`,boxShadow:hover?`0 25px 50px -12px ${theme.primary}33`:undefined,transformStyle:'preserve-3d'}}>
      <div style={{aspectRatio:'4/5',position:'relative',overflow:'visible',height:'auto'}}>
        {img&&!imgErr?(
          <img src={img} alt={product.name} onError={()=>setImgErr(true)}
            style={{width:'100%',height:'100%',objectFit:'cover',display:'block',transition:'transform 0.5s',transform:hover?'scale(1.1)':'scale(1)'}}/>
        ):(
          <div style={{width:'100%',height:'100%',minHeight:'100%',background:`linear-gradient(135deg,${theme.primary}20,${theme.secondary}20)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:72}}>👗</div>
        )}
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 55%)',pointerEvents:'none'}}/>
        {product.tag&&(
          <span style={{position:'absolute',top:10,left:10,padding:'4px 10px',borderRadius:100,fontSize:9,fontWeight:800,letterSpacing:1.5,background:product.tag==='sale'?'#FF4500':product.tag==='luxury'?'#C9A84C':product.tag==='new'?theme.primary:'#FF6B00',color:product.tag==='luxury'?'#000':'#fff',boxShadow:`0 4px 12px rgba(0,0,0,0.4)`}}>
            {product.tag==='sale'&&discount?`-${discount}%`:product.tag==='new'?'✦ NEW':product.tag==='luxury'?'✧ LUXURY':'🔥 HOT'}
          </span>
        )}
        <button onClick={(e)=>{e.stopPropagation();onWishlist(product.id)}} className="wishlist-btn"
          style={{position:'absolute',top:10,right:10,background:isWished?'rgba(255,45,120,0.9)':'rgba(0,0,0,0.6)',backdropFilter:'blur(8px)',border:`1px solid ${isWished?'#FF2D78':'rgba(255,255,255,0.15)'}`,width:34,height:34,borderRadius:'50%',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:hover||isWished?1:0,transition:'all 0.3s',boxShadow:isWished?'0 0 16px rgba(255,45,120,0.6)':undefined}}>
          {isWished?'❤️':'🤍'}
        </button>
      </div>
      <div className="product-info" style={{padding:'14px 16px'}}>
        <div style={{fontSize:10,color:theme.primary,letterSpacing:2,textTransform:'uppercase',marginBottom:3,fontWeight:700}}>VIVID</div>
        <div className="product-name" style={{fontSize:14,fontWeight:700,color:'#fff',marginBottom:4,lineHeight:1.3}}>{product.name}</div>
        {product.desc&&<div className="product-desc" style={{fontSize:11.5,color:'rgba(255,255,255,0.4)',marginBottom:8}}>{product.desc}</div>}
        <div className="product-colors" style={{display:'flex',gap:5,marginBottom:10}}>
          {(product.colors||[]).map((c,i)=>(
            <div key={i} style={{width:12,height:12,borderRadius:'50%',background:c,border:'1.5px solid rgba(255,255,255,0.25)',boxShadow:`0 0 4px ${c}60`}}/>
          ))}
        </div>
        <div className="product-rating" style={{display:'flex',alignItems:'center',marginBottom:10}}>
          <span style={{color:'#FFB800',fontSize:12}}>{'★'.repeat(Math.floor(product.rating||4))}{'☆'.repeat(5-Math.floor(product.rating||4))}</span>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.35)',marginLeft:5}}>({(product.reviews||0).toLocaleString()})</span>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <span className="product-price" style={{fontSize:18,fontWeight:800,color:theme.primary}}>Rs {product.price.toLocaleString()}</span>
            {product.old&&<span style={{fontSize:11,color:'rgba(255,255,255,0.3)',textDecoration:'line-through',marginLeft:7}}>Rs {product.old.toLocaleString()}</span>}
          </div>
          <button onClick={()=>onAddCart(product)} className="btn-premium product-add-btn"
            style={{background:`linear-gradient(135deg,${theme.primary},${theme.secondary})`,border:'none',color:'#fff',width:36,height:36,borderRadius:10,fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>
            +
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══ CATEGORY PAGE ═══ */
function CategoryPage({pageId,onAddCart,onWishlist,wishlist}){
  const theme=PAGE_THEMES[pageId];
  const products=ALL_PRODUCTS[pageId]||[];
  const [filters,setFilters]=useState({sort:'all'});
  const [search,setSearch]=useState('');
  const configs={
    men:{title:"MEN'S COLLECTION",sub:'Bold, confident, stylish',hero:"Your ultimate destination for men's fashion — premium styles for every occasion.",bg1:'#04080f',shape:'▲'},
    women:{title:"WOMEN'S FASHION",sub:'Elegance redefined',hero:'The perfect outfit for every occasion — from casual to couture.',bg1:'#0a050d',shape:'◆'},
    kids:{title:"KIDS' CORNER",sub:'Fun and comfort',hero:'Colorful, durable and super cute — the best collection for kids!',bg1:'#0a0800',shape:'★'},
    streetwear:{title:'STREETWEAR',sub:'Hustle. Drip. Repeat.',hero:'Authentic street culture — bold graphics, clean silhouettes.',bg1:'#030303',shape:'✦'},
    accessories:{title:'ACCESSORIES',sub:'Complete the look',hero:'The right accessory transforms any outfit — shop our curated edit.',bg1:'#080600',shape:'◈'},
    shoes:{title:'FOOTWEAR',sub:'Walk in style',hero:'From chunky sneakers to elegant heels — every step counts.',bg1:'#05040c',shape:'⬡'},
    luxury:{title:'LUXURY EDIT',sub:'Crafted for connoisseurs',hero:'Premium fabrics, exceptional craftsmanship — fashion as art.',bg1:'#060606',shape:'✧'},
    newin:{title:'NEW ARRIVALS',sub:'Just dropped',hero:'Fresh from the runway to your wardrobe — be the first to wear it.',bg1:'#020c0a',shape:'◉'},
    sale:{title:'SALE ZONE',sub:'Up to 70% off',hero:'Incredible deals on premium fashion — limited time, limited stock!',bg1:'#0a0300',shape:'%'},
  };
  const cfg=configs[pageId]||configs.men;
  let sorted=[...products];
  if(search) sorted=sorted.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
  if(filters.sort==='price_asc') sorted.sort((a,b)=>a.price-b.price);
  else if(filters.sort==='price_desc') sorted.sort((a,b)=>b.price-a.price);
  else if(filters.sort==='rating') sorted.sort((a,b)=>(b.rating||4)-(a.rating||4));
  else if(filters.sort!=='all') sorted=sorted.filter(p=>p.tag===filters.sort);
  return(
    <div className="page" style={{background:cfg.bg1,minHeight:'100vh'}}>
      {/* 3D HERO for each category */}
      <CategoryHero3D cfg={cfg} theme={theme} products={products}/>
      {/* SEARCH + FILTER */}
      <div style={{padding:'32px clamp(12px, 4vw, 48px) 0'}}>
        <div className="search-filter-row" style={{display:'flex',gap:12,marginBottom:20,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{position:'relative',flex:1,minWidth:200,maxWidth:340}}>
            <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:14}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={`Search ${pageId}...`}
              style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${theme.primary}28`,borderRadius:10,padding:'11px 16px 11px 42px',color:'#fff',fontSize:13,outline:'none',fontFamily:"'Outfit',sans-serif",transition:'border-color 0.2s'}}/>
          </div>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.35)',fontWeight:600}}>{sorted.length} products</div>
        </div>
        <FilterBar theme={theme} filters={filters} setFilters={setFilters} products={products}/>
      </div>
      {/* GRID */}
      <div className="product-grid">
        {sorted.map((p,i)=>(
          <div key={p.id} className="product-card-container" style={{animation:`fadeUp 0.4s ease ${i*0.04}s both`}}>
            <ProductCard product={p} theme={theme} onAddCart={onAddCart} onWishlist={onWishlist} isWished={wishlist.includes(p.id)}/>
          </div>
        ))}
        {sorted.length===0&&(
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:'80px 20px',color:'rgba(255,255,255,0.3)'}}>
            <div style={{fontSize:56,marginBottom:16}}>🔍</div>
            <div style={{fontSize:18}}>No products found</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══ MAIN APP ═══ */
function App(){
  const [page,setPage]=useState('home');
  const [scroll,setScroll]=useState(0);
  const [cart,setCart]=useState([]);
  const [wishlist,setWishlist]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [wishlistOpen,setWishlistOpen]=useState(false);
  const [profileOpen,setProfileOpen]=useState(false);
  const [toast,setToast]=useState({msg:'',show:false});
  const [menuOpen,setMenuOpen]=useState(false);
  const currentTheme=PAGE_THEMES[page]||PAGE_THEMES.home;

  useEffect(()=>{
    const handleScroll=()=>{
      const h=document.documentElement.scrollHeight-window.innerHeight;
      setScroll((window.scrollY/h)*100);
    };
    window.addEventListener('scroll',handleScroll);
    return ()=>window.removeEventListener('scroll',handleScroll);
  },[]);

  const showToast=(msg)=>{setToast({msg,show:true});setTimeout(()=>setToast(t=>({...t,show:false})),2500);};
  const addToCart=(product)=>{
    setCart(prev=>{
      const ex=prev.find(i=>i.id===product.id);
      if(ex) return prev.map(i=>i.id===product.id?{...i,qty:i.qty+1}:i);
      return [...prev,{...product,qty:1}];
    });
    showToast(`${product.name} added to cart! 🎉`);
  };
  const toggleWishlist=(id)=>{
    const inList=wishlist.includes(id);
    setWishlist(prev=>inList?prev.filter(x=>x!==id):[...prev,id]);
    showToast(inList?'Removed from wishlist':'Added to wishlist! ❤️');
  };
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const handleSetPage=(p)=>{setPage(p);window.scrollTo({top:0,behavior:'smooth'});};

  return(
    <>
      <div style={{position:'fixed',top:0,left:0,width:`${scroll}%`,height:3,background:`linear-gradient(90deg,${currentTheme.primary},${currentTheme.secondary})`,zIndex:1100,transition:'width 0.1s'}}/>
      <Navbar currentPage={page} setPage={handleSetPage} cartCount={cartCount} wishCount={wishlist.length} setCartOpen={setCartOpen} setWishlistOpen={setWishlistOpen} setProfileOpen={setProfileOpen} setMenuOpen={setMenuOpen}/>
      <div style={{paddingTop:62}}>
        {page==='home'?<HomePage setPage={handleSetPage} theme={currentTheme}/>:<CategoryPage pageId={page} onAddCart={addToCart} onWishlist={toggleWishlist} wishlist={wishlist}/>}
      </div>
      <Footer setPage={handleSetPage}/>
      <CartSidebar cart={cart} setCart={setCart} open={cartOpen} setOpen={setCartOpen} theme={currentTheme}/>
      <WishlistModal open={wishlistOpen} setOpen={setWishlistOpen} wishlist={wishlist} setPage={handleSetPage} onAddCart={addToCart} theme={currentTheme}/>
      <ProfileModal open={profileOpen} setOpen={setProfileOpen}/>
      <Toast msg={toast.msg} show={toast.show} color={currentTheme.primary}/>
